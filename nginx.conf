server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Base64 frame'ler payload'i sisirir, default 1MB'i asar.
    client_max_body_size 10M;

    # /api/* isteklerini backend'e proxy'le, /api prefix'ini soyup yolla.
    location /api/ {
        # Backend container yeni IP alirsa cache'lenmis IP'ye gitmesin diye
        # her istekte DNS resolve et (variable + resolver kombosu).
        resolver 127.0.0.11 ipv6=on valid=10s;
        set $backend_upstream "backend:8000";
        proxy_pass http://$backend_upstream/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback — bilinmeyen yolu index.html'e yonlendir.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
